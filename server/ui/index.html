<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conductor</title>
<style>
  :root{
    --bg:#f4f6fb; --panel:#ffffff; --ink:#1e2438; --muted:#6b7488; --line:#e5e9f2;
    --brand:#4f46e5; --brand2:#06b6d4; --accent:#ede9fe;
    --todo:#94a3b8; --claimed:#8b5cf6; --prog:#0ea5e9; --blocked:#ef4444; --review:#f59e0b; --done:#10b981;
    --shadow:0 1px 3px rgba(20,30,60,.06),0 8px 24px rgba(20,30,60,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  /* top bar */
  header{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--panel);
         border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;letter-spacing:-.3px}
  .brand .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--brand2))}
  .proj{color:var(--muted);font-weight:500;font-size:13px;padding:3px 10px;background:var(--bg);border-radius:20px}
  .live{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:12px;margin-left:auto}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--done);box-shadow:0 0 0 0 rgba(16,185,129,.5);animation:p 2s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}70%{box-shadow:0 0 0 7px rgba(16,185,129,0)}100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn.primary:hover{background:#4338ca}
  .btn.ghost{border:none;background:transparent;color:var(--muted);padding:6px 8px}
  /* layout */
  main{display:grid;grid-template-columns:240px 1fr 300px;gap:14px;padding:14px;height:calc(100vh - 59px)}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
       display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .col > h2{margin:0;padding:13px 16px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
            border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .scroll{overflow-y:auto;padding:10px;flex:1;min-height:0}
  /* agents */
  .agent{padding:11px 12px;border-radius:11px;border:1px solid var(--line);margin-bottom:9px;background:#fcfdff;cursor:pointer;transition:border-color .12s,box-shadow .12s}
  .agent:hover{border-color:#c7d2fe;box-shadow:0 2px 8px rgba(79,70,229,.08)}
  .agent .top{display:flex;align-items:center;gap:8px}
  .agent .nm{font-weight:650}
  .sdot{width:9px;height:9px;border-radius:50%;flex:none}
  .s-working{background:var(--done)} .s-idle{background:var(--todo)} .s-blocked{background:var(--blocked)} .s-offline{background:#cbd5e1}
  #users .urow{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:13px;border-bottom:1px solid var(--line)}
  #users .urow .nm{font-weight:600} #users .urow .ur{margin-left:auto;font-size:11px;color:var(--muted)}
  .agent .meta{color:var(--muted);font-size:12px;margin-top:5px;line-height:1.4}
  .agent .task{margin-top:6px;font-size:12px;color:var(--prog);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gitline{margin-top:5px;font-size:11px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .g-ahead{color:#059669} .g-behind{color:#d97706} .g-conf{color:var(--blocked);font-weight:700} .g-dirty{color:#d97706}
  /* board */
  #boardWrap{padding:0;overflow:hidden}
  #board{display:flex;gap:12px;overflow-x:auto;padding:12px;height:100%}
  .lane{flex:0 0 236px;display:flex;flex-direction:column;background:var(--bg);border-radius:12px;min-height:0}
  .lane > h3{margin:0;padding:11px 13px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;position:sticky;top:0}
  .lane h3 .cnt{margin-left:auto;color:var(--muted);font-weight:600;background:var(--panel);border-radius:20px;padding:1px 8px;font-size:11px}
  .lane .bar{width:9px;height:9px;border-radius:3px}
  .lane .items{overflow-y:auto;padding:4px 9px 12px;flex:1;min-height:40px}
  .lane.drag{outline:2px dashed var(--brand);outline-offset:-4px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px;margin-bottom:9px;box-shadow:0 1px 2px rgba(20,30,60,.05);cursor:grab}
  .card:active{cursor:grabbing}
  .card .t{font-weight:600;line-height:1.35;margin-bottom:8px}
  .card .foot{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .chip{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--muted);font-weight:600}
  .chip.pri{background:#fef3c7;color:#b45309}
  .chip.mode-auto{background:#e0e7ff;color:#4338ca} .chip.mode-manual{background:#cffafe;color:#0e7490}
  .card select{margin-top:8px;width:100%;border:1px solid var(--line);border-radius:8px;padding:5px 7px;font-size:12px;color:var(--ink);background:#fcfdff}
  .card .dep{color:var(--blocked);font-size:11px;margin-top:6px}
  /* feed */
  /* feed cards */
  .fcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 11px;margin-bottom:8px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
  .fcard:hover{border-color:#c7d2fe;box-shadow:0 2px 8px rgba(79,70,229,.08)}
  .fcard.msg{background:#faf5ff}
  .fc-top{display:flex;align-items:center;gap:7px;font-size:12px}
  .fc-ico{flex:none}
  .fc-who{font-weight:650}
  .fc-sub{color:var(--muted)}
  .fc-tm{margin-left:auto;color:var(--muted);font-size:11px;flex:none}
  .fc-act{color:var(--muted);font-size:12.5px;margin-top:3px}
  .fc-tgt{font-weight:600;font-size:12.5px;margin-top:3px;line-height:1.35}
  .fc-body{font-size:12.5px;margin-top:4px;line-height:1.4}
  /* detail modal */
  .modal.detail{width:min(560px,94vw);padding:0;overflow:hidden}
  .dhead{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--line)}
  .dhead h3{margin:0}
  .dbody{padding:6px 20px 20px;max-height:74vh;overflow-y:auto}
  .dsec{margin-top:16px}
  .dsec h4{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .dtask{border:1px solid var(--line);border-radius:11px;padding:12px;background:#fcfdff}
  .dtask-h{display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:6px;line-height:1.35}
  .dmeta{color:var(--muted);font-size:12px}
  .dspec{margin-top:8px;font-size:13px;line-height:1.5;white-space:pre-wrap}
  .art{background:#f6f8fc;border-radius:8px;padding:8px;font-size:11px;overflow-x:auto;margin-top:8px}
  .badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:700;color:#fff;flex:none}
  .b-todo{background:var(--todo)} .b-claimed{background:var(--claimed)} .b-in_progress{background:var(--prog)}
  .b-blocked{background:var(--blocked)} .b-review{background:var(--review)} .b-done{background:var(--done)}
  .tl{display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid var(--line);font-size:12.5px}
  .tl:last-child{border-bottom:none}
  .tl-ic{flex:none} .tl-tx{flex:1;line-height:1.4} .tl-tm{color:var(--muted);font-size:11px;flex:none}
  .dmsg{background:#faf5ff;border-radius:9px;padding:8px 10px;margin-bottom:7px;font-size:12.5px;line-height:1.45}
  .dmsg .rt{color:var(--muted);font-size:11px;float:right}
  .agent-hero{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700}
  .agent-hero .dmeta{font-weight:400}
  /* modal + overlay */
  .overlay{position:fixed;inset:0;background:rgba(15,20,40,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:var(--panel);border-radius:16px;padding:24px;width:min(460px,92vw);box-shadow:0 20px 60px rgba(20,30,60,.25)}
  .modal h3{margin:0 0 16px}
  .modal label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 5px}
  .modal input,.modal textarea,.modal select{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;color:var(--ink)}
  .modal textarea{resize:vertical;min-height:64px}
  .modal .row{display:flex;gap:10px}.modal .row>*{flex:1}
  .modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .hint{color:var(--muted);font-size:12px;margin-top:6px}
  .empty{color:#aab2c5;font-size:12px;text-align:center;padding:14px}
  /* tabs + pages */
  nav.tabs{display:flex;gap:4px;margin-left:6px}
  nav.tabs a{padding:7px 14px;border-radius:9px;font-weight:600;font-size:13px;color:var(--muted);text-decoration:none}
  nav.tabs a:hover{background:var(--bg);color:var(--ink)}
  nav.tabs a.active{background:var(--accent);color:var(--brand)}
  section.page{padding:16px;height:calc(100vh - 59px);overflow-y:auto}
  .page-inner{max-width:1080px;margin:0 auto}
  /* memory */
  .bk-add{display:flex;gap:8px;margin-bottom:12px}
  .bk-add input{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--ink)}
  .bk-tools{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .bk-tools input,.bk-tools select{border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--panel)}
  .bk-tools .search{flex:1;min-width:170px}
  #journal{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .jrow{display:flex;gap:11px;align-items:baseline;padding:10px 14px;border-bottom:1px solid var(--line)}
  .jrow:last-child{border-bottom:none}
  .jts{flex:none;color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums;width:96px}
  .jico{flex:none}
  .jtx{flex:1;font-size:13px;line-height:1.5}
  .jwho{font-weight:650}
  .jtag{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:700}
  .t-activity{background:#e0e7ff;color:#4338ca} .t-message{background:#f3e8ff;color:#7e22ce} .t-memory{background:#dcfce7;color:#15803d}
  .k-handoff{background:#fef3c7;color:#b45309} .k-decision{background:#dbeafe;color:#1d4ed8} .k-note{background:#f1f5f9;color:#475569}
  .jbody{background:#f8faff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:5px;font-size:12.5px;line-height:1.5;white-space:pre-wrap}
  /* analytics */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 18px;box-shadow:var(--shadow)}
  .stat .n{font-size:26px;font-weight:750;letter-spacing:-.5px}
  .stat .l{color:var(--muted);font-size:12px;margin-top:2px}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .chart{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .chart h3{margin:0 0 10px;font-size:13px}
  .chart.wide{grid-column:1 / -1}
  @media(max-width:820px){.charts{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="brand"><div class="dot"></div>Conductor</div>
  <span class="proj" id="projName">…</span>
  <nav class="tabs">
    <a href="#board" data-view="board">Board</a>
    <a href="#memory" data-view="memory">Memory</a>
    <a href="#analytics" data-view="analytics">Analytics</a>
  </nav>
  <div class="live"><span class="pulse"></span><span id="liveTxt">connecting…</span></div>
  <button class="btn ghost" title="Working brief" onclick="showBrief()">ℹ Brief</button>
  <button class="btn primary" onclick="openTask()">+ Task</button>
  <button class="btn ghost" title="Change token" onclick="logout()">⚙</button>
</header>

<main id="view-board">
  <section class="col">
    <h2>Agents <span id="agCount" style="color:var(--muted)"></span></h2>
    <div class="scroll" id="agents"></div>
      <h2>Users <span id="usrCount" style="color:var(--muted)"></span></h2>
      <div id="users"></div>
  </section>

  <section class="col" id="boardWrap">
    <div id="board"></div>
  </section>

  <section class="col">
    <h2>Feed</h2>
    <div class="scroll" id="feed"></div>
  </section>
</main>

<section id="view-memory" class="page" style="display:none"><div class="page-inner">
  <div class="bk-add">
    <input id="bk_note" placeholder="Write a note / decision / handoff…" onkeydown="if(event.key==='Enter')addNote()">
    <select id="bk_kind"><option value="note">Note</option><option value="decision">Decision</option><option value="handoff">Handoff</option></select>
    <button class="btn primary" onclick="addNote()">Add</button>
  </div>
  <div class="bk-tools">
    <input class="search" id="bk_search" placeholder="Search…" oninput="renderMemory()">
    <select id="bk_agent" onchange="renderMemory()"><option value="">Everyone</option></select>
    <select id="bk_type" onchange="renderMemory()">
      <option value="">All types</option><option value="activity">Events</option>
      <option value="message">Messages</option><option value="memory">Notes</option></select>
    <button class="btn" onclick="loadJournal()">↻ Refresh</button>
  </div>
  <div id="journal"></div>
</div></section>

<section id="view-analytics" class="page" style="display:none"><div class="page-inner">
  <div class="cards" id="an_cards"></div>
  <div class="charts" id="an_charts"></div>
</div></section>

<script>
const LANES=[
  ["todo","To Do","var(--todo)"],["claimed","Active","var(--claimed)"],
  ["in_progress","Test","var(--prog)"],["blocked","Blocked","var(--blocked)"],
  ["review","Review","var(--review)"],["done","Done","var(--done)"]];
const LANE_TR=Object.fromEntries(LANES.map(l=>[l[0],l[1]]));
let TOKEN=localStorage.getItem("conductor_token")||"";
let STATE={agents:[],tasks:[],activity:[],messages:[]};
let dragId=null, busy=false;

function tok(){return TOKEN}
async function api(method,path,body){
  const r=await fetch(path,{method,headers:{"Authorization":"Bearer "+tok(),
    ...(body?{"content-type":"application/json"}:{})},body:body?JSON.stringify(body):undefined});
  if(r.status===401){promptToken();throw new Error("401")}
  if(!r.ok)throw new Error(await r.text());
  return r.status===204?null:r.json();
}
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function ago(iso){if(!iso)return"—";const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<60)return Math.max(0,Math.round(s))+" s";if(s<3600)return Math.round(s/60)+" m";
  if(s<86400)return Math.round(s/3600)+" h";return Math.round(s/86400)+" d";}
function agentStatus(a){
  const hb=a.last_heartbeat?Date.now()-new Date(a.last_heartbeat).getTime():Infinity;
  if(a.status==="offline"||hb>120000)return "offline";   // 2 min silent → offline (honest roster)
  if(a.status==="working"&&hb>60000)return "idle";
  return a.status||"offline";
}
function gitBadge(a){
  const g=a.git||{}; const p=[];
  if(a.branch) p.push(`⎇ ${esc(a.branch)}`);
  if(g.ahead)     p.push(`<span class="g-ahead">↑${g.ahead}</span>`);
  if(g.behind)    p.push(`<span class="g-behind">↓${g.behind}</span>`);
  if(g.conflicts) p.push(`<span class="g-conf">⚠${g.conflicts}</span>`);
  if(g.dirty)     p.push(`<span class="g-dirty">●</span>`);
  return p.length?`<div class="gitline">${p.join(' ')}</div>`:'';
}

function renderAgents(){
  document.getElementById("agCount").textContent=STATE.agents.length;
  const tasksById=Object.fromEntries(STATE.tasks.map(t=>[t.id,t]));
  const _el=document.getElementById("agents"), _sc=_el.scrollTop;
  _el.innerHTML=STATE.agents.map((a,i)=>{
    const st=agentStatus(a);const ct=a.current_task_id&&tasksById[a.current_task_id];
    return `<div class="agent" onclick="openAgentDetail(${i})"><div class="top"><span class="sdot s-${st}"></span>
      <span class="nm">${esc(a.name)}</span></div>
      <div class="meta">${esc(a.machine||"")} · ${st} · ♥ ${ago(a.last_heartbeat)}</div>
      ${gitBadge(a)}
      ${ct?`<div class="task">▸ ${esc(ct.title)}</div>`:""}
      ${a.note?`<div class="meta">${esc(a.note)}</div>`:""}</div>`;
  }).join("")||`<div class="empty">No agents yet</div>`;
  _el.scrollTop=_sc;
}

function renderUsers(){
  const u=(STATE.users||[]);
  document.getElementById("usrCount").textContent=u.filter(x=>x.online).length+"/"+u.length;
  const el=document.getElementById("users"),sc=el.scrollTop;
  el.innerHTML=u.map(x=>`<div class="urow"><span class="sdot s-${x.online?'working':'offline'}"></span><span class="nm">${esc(x.label)}</span><span class="ur">${x.online?'\ud83d\udfe2 on page':'offline'}</span></div>`).join("")||`<div class="empty">—</div>`;
  el.scrollTop=sc;
}
let _boardSig="";
function renderBoard(force){
  const byId=Object.fromEntries(STATE.tasks.map(t=>[t.id,t]));
  const agents=STATE.agents.map(a=>a.name);
  // Change signature — everything that affects the visuals. If unchanged, DON'T TOUCH the DOM (scroll preserved).
  const sig=JSON.stringify([agents, STATE.tasks.map(t=>
    [t.id,t.status,t.assignee,t.assign_mode,t.priority,t.board_order,t.title,t.prompt_state,(t.depends_on||[]).length])]);
  if(!force && sig===_boardSig) return;
  _boardSig=sig;
  const board=document.getElementById("board");
  // When a redraw is needed, save scroll positions → restore them (avoid jumping to the top)
  const sx=board.scrollLeft, sy={};
  board.querySelectorAll(".items").forEach(el=>sy[el.dataset.status]=el.scrollTop);
  board.innerHTML=LANES.map(([key,label,color])=>{
    const items=STATE.tasks.filter(t=>t.status===key);
    return `<div class="lane" data-status="${key}">
      <h3><span class="bar" style="background:${color}"></span>${label}<span class="cnt">${items.length}</span></h3>
      <div class="items" data-status="${key}">${items.map(t=>card(t,byId,agents)).join("")||""}</div></div>`;
  }).join("");
  wireDnD();
  board.scrollLeft=sx;
  board.querySelectorAll(".items").forEach(el=>{if(sy[el.dataset.status]!=null)el.scrollTop=sy[el.dataset.status];});
}
function psChip(t){
  const m={pending:['⏳ Claude queued','#fef3c7','#b45309'],
           running:['⚙ Claude working','#dbeafe','#1d4ed8'],
           done:['✓ done','#dcfce7','#15803d']}[t.prompt_state];
  return m?`<span class="chip" style="background:${m[1]};color:${m[2]}">${m[0]}</span>`:'';
}
function card(t,byId,agents){
  const unmet=(t.depends_on||[]).filter(id=>byId[id]&&byId[id].status!=="done").length;
  const opt=`<option value="">— auto pool —</option>`+agents.map(n=>
    `<option value="${esc(n)}" ${t.assignee===n?"selected":""}>${esc(n)}</option>`).join("");
  return `<div class="card" draggable="true" data-id="${t.id}">
    <div class="t" onclick="openTaskCard('${t.id}')" style="cursor:pointer" title="Detail / prompt / revise / delete">${esc(t.title)}</div>
    <div class="foot">
      ${t.priority?`<span class="chip pri">P${t.priority}</span>`:""}
      <span class="chip mode-${t.assign_mode}">${t.assign_mode==="manual"?"manual":"auto"}</span>
      ${t.assignee?`<span class="chip">👤 ${esc(t.assignee)}</span>`:""}
      ${psChip(t)}
    </div>
    ${unmet?`<div class="dep">⛔ ${unmet} dependency waiting</div>`:""}
    <select onchange="assign('${t.id}',this.value)" onmousedown="event.stopPropagation()">${opt}</select>
  </div>`;
}

// ── Task card: click the title → detail / edit / delete ──
function openTaskCard(id){
  const t=STATE.tasks.find(x=>x.id===id); if(!t)return;
  const agents=STATE.agents.map(a=>a.name);
  const acts=STATE.activity.filter(a=>(a.detail||{}).task_id===id);
  const msgs=STATE.messages.filter(m=>m.task_id===id);
  const statusOpts=LANES.map(([k,l])=>`<option value="${k}" ${t.status===k?"selected":""}>${l}</option>`).join("");
  const whoOpts=`<option value="">— auto pool —</option>`+agents.map(n=>`<option ${t.assignee===n?"selected":""}>${esc(n)}</option>`).join("");
  const art=t.artifacts&&Object.keys(t.artifacts).length

// Produce icon/label/target for an activity event (shared by card + timeline)
function actMeta(e){
  const d=e.detail||{};
  const tById=Object.fromEntries(STATE.tasks.map(t=>[t.id,t]));
  const title=d.title||(d.task_id&&tById[d.task_id]?tById[d.task_id].title:null);
  const M={
    "task.created":{icon:"➕",label:"created a task",target:title},
    "task.claimed":{icon:"🖐",label:"claimed a task",target:title},
    "task.updated":{icon:"✎",label:"updated"+(d.status?" · "+(LANE_TR[d.status]||d.status):""),target:title},
    "task.reclaimed":{icon:"♻",label:"returned task to pool",target:title},
    "task.deleted":{icon:"🗑",label:"deleted a task",target:title},
    "agent.registered":{icon:"●",label:"joined the board",target:d.machine||null},
    "message.posted":null,   // messages are shown as separate cards
  };
  return M[e.kind];
}

    actor=item.from_agent; taskId=item.task_id||null; head=`💬 ${esc(actor||"?")}`; }

      <span class="tl-tx"><b>${esc(actor||"?")}</b> ${m.label}${m.target?(" · "+esc(m.target)):""}</span>

  if(task){

function wireDnD(){
  document.querySelectorAll(".card").forEach(c=>{
    c.addEventListener("dragstart",e=>{dragId=c.dataset.id;busy=true;e.dataTransfer.effectAllowed="move"});
    c.addEventListener("dragend",()=>{busy=false;document.querySelectorAll(".lane").forEach(l=>l.classList.remove("drag"))});
  });
  document.querySelectorAll(".lane").forEach(l=>{
    l.addEventListener("dragover",e=>{e.preventDefault();l.classList.add("drag")});
    l.addEventListener("dragleave",()=>l.classList.remove("drag"));
    l.addEventListener("drop",async e=>{e.preventDefault();l.classList.remove("drag");
      const st=l.dataset.status; const id=dragId; dragId=null; busy=false;
      if(!id) return;
      const t=STATE.tasks.find(x=>x.id===id);
      if(st==="claimed" && (!t||t.status!=="claimed")){ openActivateModal(id); return; }   // Activate → ask for prompt
      if(st==="review" && (!t||t.status!=="review")){ sendToReview(id); return; }           // To Review → smoke test
      let patch={status:st};
      if(st==="todo") patch.prompt_state="idle";                                            // back to pool → reset prompt
      try{await api("PATCH","/api/tasks/"+id,patch);await refresh()}catch(_){}});
  });
}

    const txt=esc(h.result||h.prompt||"");

                   :(esc(h.by||"?")+" — prompt"+(h.status?" ("+(LANE_TR[h.status]||h.status)+")":""));

  const q=(document.getElementById('bk_search').value||'').toLowerCase();
  const items=[];
  JOURNAL.activity.forEach(a=>{const m=actMeta(a);if(!m)return;
    items.push({ts:a.created_at,type:'activity',who:a.actor,icon:m.icon,text:m.label+(m.target?' · '+m.target:'')});});
  JOURNAL.messages.forEach(m=>items.push({ts:m.created_at,type:'message',who:m.from_agent,icon:'💬',
    sub:m.to_agent?('→ '+m.to_agent):'→ everyone',body:m.body}));
  JOURNAL.memory.forEach(m=>items.push({ts:m.created_at,type:'memory',who:m.author,kind:m.kind,body:m.body,
    icon:m.kind==='handoff'?'🔁':m.kind==='decision'?'⚖️':'📝'}));
  let list=items.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  if(agent) list=list.filter(x=>x.who===agent);
  if(type)  list=list.filter(x=>x.type===type);
  if(q)     list=list.filter(x=>((x.text||'')+(x.body||'')+(x.who||'')).toLowerCase().includes(q));
  document.getElementById('journal').innerHTML=list.slice(0,400).map(x=>{
    const tt={activity:'event',message:'message',memory:'memory'}[x.type];
    const tag=`<span class="jtag t-${x.type}">${tt}</span>`;
    const kt=x.kind?` <span class="jtag k-${x.kind}">${x.kind==='handoff'?'handoff':x.kind==='decision'?'decision':'note'}</span>`:'';
    const line=x.text?esc(x.text):(x.sub?`<span class="dmeta">${esc(x.sub)}</span>`:'');
    const body=x.body?`<div class="jbody">${esc(x.body)}</div>`:'';
    return `<div class="jrow"><span class="jts">${fmtTs(x.ts)}</span><span class="jico">${x.icon}</span>
      <span class="jtx"><span class="jwho">${esc(x.who||'?')}</span> ${tag}${kt} ${line}${body}</span></div>`;
  }).join('')||`<div class="empty">No records</div>`;
}

// ── Analytics page ──
async function loadAnalytics(){ try{renderAnalytics(await api("GET","/api/analytics"));}catch(_){} }
function barChart(data,h,color){
  if(!data.length) return `<div class="empty">No data</div>`;
  const max=Math.max(1,...data.map(d=>d.v));
  const bw=Math.max(20,Math.min(60,Math.floor(560/data.length)));
  const W=data.length*bw, pad=22, bh=h-pad;
  const bars=data.map((d,i)=>{const H=Math.round(bh*d.v/max),x=i*bw,y=bh-H;
    return `<rect x="${x+bw*0.18}" y="${y}" width="${bw*0.64}" height="${H}" rx="3" fill="${color}"/>`+
      (d.v?`<text x="${x+bw/2}" y="${y-3}" text-anchor="middle" font-size="9" fill="#6b7488">${d.v}</text>`:'')+
      `<text x="${x+bw/2}" y="${h-6}" text-anchor="middle" font-size="9" fill="#6b7488">${esc(String(d.label))}</text>`;
  }).join('');
  return `<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${h}" style="width:100%;max-width:${W}px;height:${h}px;display:block">${bars}</svg></div>`;
}
function renderAnalytics(a){
  const t=a.totals;
  document.getElementById('an_cards').innerHTML=[
    [t.events,'Total events'],[t.contributors,'Contributors'],
    [a.tasks_status.done||0,'Completed tasks'],[t.messages,'Messages'],[t.memory,'Memory notes']
  ].map(([n,l])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
  const hours=Array.from({length:24},(_,h)=>({label:String(h).padStart(2,'0'),v:(a.by_hour.find(x=>x.hr===h)||{}).n||0}));
  const agents=a.per_agent.map(x=>({label:x.agent,v:x.n}));
  const days=a.by_day.map(x=>({label:x.d.slice(5),v:x.n}));
  const st=Object.entries(a.tasks_status).map(([k,v])=>({label:LANE_TR[k]||k,v}));
  document.getElementById('an_charts').innerHTML=
    `<div class="chart wide"><h3>Activity — by hour (local time)</h3>${barChart(hours,150,'#4f46e5')}</div>`+
    `<div class="chart"><h3>Activity by agent</h3>${barChart(agents,140,'#06b6d4')}</div>`+
    `<div class="chart"><h3>Task status</h3>${barChart(st,140,'#10b981')}</div>`+
    `<div class="chart wide"><h3>Last 14 days</h3>${barChart(days,120,'#8b5cf6')}</div>`;
}

async function refresh(){
  if(busy)return;
  try{
    const s=await api("GET","/api/state");STATE=s;
    document.getElementById("liveTxt").textContent="live";
    document.getElementById("projName").textContent=s.project||"project";
    renderAgents();renderUsers();renderBoard();renderFeed();
    if(currentView()==='analytics') loadAnalytics();   // charts are live; memory is refreshed manually (scroll preserved)
  }catch(e){ if(e.message!=="401")document.getElementById("liveTxt").textContent="no connection"; }
}
function boot(){ showView(currentView()); refresh(); }
if(!location.hash) history.replaceState(null,'','#board');
if(!TOKEN)promptToken();else boot();
setInterval(()=>{if(TOKEN)refresh()},2500);
</script>
