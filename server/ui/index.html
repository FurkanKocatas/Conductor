<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conductor</title>
<style>
  :root{
    --bg:#eef1f8; --bg2:#e6eaf4; --panel:#ffffff; --panel2:#f7f9fd;
    --ink:#161a2b; --ink2:#3d4560; --muted:#6b7488; --faint:#9aa2b5;
    --line:#e4e8f2; --line2:#eef1f8;
    --brand:#5b54e6; --brand-ink:#4b44d6; --brand-soft:#ecebfe;
    --ok:#12b886; --warn:#f59f0a; --danger:#ef4444; --info:#2f9bee;
    --todo:#8b93a7; --claimed:#7c6df2; --prog:#2f9bee; --blocked:#ef4444; --review:#f59f0a; --done:#12b886;
    --radius:14px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(20,30,60,.04), 0 6px 20px rgba(20,30,60,.06);
    --shadow-lg:0 24px 70px rgba(20,30,60,.28);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  :root[data-theme="dark"]{
    --bg:#0e1017; --bg2:#0a0c12; --panel:#171a24; --panel2:#1e222e;
    --ink:#e8ebf5; --ink2:#c3c9d8; --muted:#8b93a7; --faint:#5b6376;
    --line:#262b39; --line2:#20242f;
    --brand:#7d76f5; --brand-ink:#8f88ff; --brand-soft:#241f47;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
    --shadow-lg:0 24px 70px rgba(0,0,0,.6);
  }
  @media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --bg:#0e1017; --bg2:#0a0c12; --panel:#171a24; --panel2:#1e222e;
    --ink:#e8ebf5; --ink2:#c3c9d8; --muted:#8b93a7; --faint:#5b6376;
    --line:#262b39; --line2:#20242f; --brand:#7d76f5; --brand-ink:#8f88ff; --brand-soft:#241f47;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35); --shadow-lg:0 24px 70px rgba(0,0,0,.6);
  }}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px;
       -webkit-font-smoothing:antialiased;overflow:hidden}
  button,input,textarea,select{font-family:inherit}
  button{cursor:pointer}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--faint)}
  .app{display:flex;flex-direction:column;height:100vh}

  /* ── HEADER ── */
  header{display:flex;align-items:center;gap:14px;padding:0 20px;height:58px;flex:none;
         background:var(--panel);border-bottom:1px solid var(--line);z-index:30}
  .brand{display:flex;align-items:center;gap:11px;font-weight:750;font-size:17px;letter-spacing:-.4px}
  .brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#6a63f0,#8f88ff 45%,#39c6e6);
       display:grid;place-items:center;color:#fff;font-size:16px;box-shadow:0 4px 12px rgba(91,84,230,.35)}
  .proj{color:var(--muted);font-weight:600;font-size:12.5px;padding:4px 11px;background:var(--bg2);border-radius:20px}
  nav.tabs{display:flex;gap:2px;background:var(--bg2);padding:3px;border-radius:11px}
  nav.tabs a{padding:7px 15px;border-radius:8px;font-weight:600;font-size:13px;color:var(--muted);text-decoration:none;transition:.12s}
  nav.tabs a:hover{color:var(--ink)}
  nav.tabs a.active{background:var(--panel);color:var(--brand-ink);box-shadow:var(--shadow)}
  .spacer{flex:1}
  .live{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12.5px;font-weight:600}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--done);box-shadow:0 0 0 0 rgba(18,184,134,.5);animation:p 2.4s infinite}
  .pulse.off{background:var(--danger);animation:none}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(18,184,134,.5)}70%{box-shadow:0 0 0 8px rgba(18,184,134,0)}100%{box-shadow:0 0 0 0 rgba(18,184,134,0)}}
  .iconbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--muted);
           display:grid;place-items:center;font-size:16px;transition:.12s}
  .iconbtn:hover{color:var(--ink);border-color:var(--faint);background:var(--panel2)}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:9px 15px;border-radius:10px;font-weight:650;font-size:13px;transition:.12s;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--faint);background:var(--panel2)}
  .btn.primary{background:linear-gradient(135deg,#6a63f0,#5b54e6);color:#fff;border:none;box-shadow:0 4px 12px rgba(91,84,230,.3)}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn.danger{background:var(--danger);color:#fff;border:none}
  .btn.ok{background:var(--ok);color:#fff;border:none}
  .btn.sm{padding:6px 11px;font-size:12px;border-radius:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* ── TEAM STRIP ── */
  .team{display:flex;align-items:center;gap:9px;padding:9px 20px;background:var(--panel);border-bottom:1px solid var(--line);
        overflow-x:auto;flex:none;min-height:54px}
  .team .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700;flex:none;margin-right:2px}
  .apill{display:flex;align-items:center;gap:9px;padding:7px 13px 7px 9px;border:1px solid var(--line);border-radius:30px;
         background:var(--panel2);cursor:pointer;flex:none;transition:.12s;max-width:280px}
  .apill:hover{border-color:var(--brand);box-shadow:0 2px 10px rgba(91,84,230,.12)}
  .av{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px;flex:none;position:relative}
  .av .sdot{position:absolute;right:-1px;bottom:-1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--panel)}
  .apill .anm{font-weight:650;font-size:13px}
  .apill .ast{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .apill .atask{font-size:11px;color:var(--prog);font-weight:600;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .s-working{background:var(--done)} .s-idle{background:var(--warn)} .s-blocked{background:var(--danger)} .s-offline{background:var(--faint)}
  .team .empty-team{color:var(--faint);font-size:12.5px}

  /* ── BOARD ── */
  .work{flex:1;display:flex;min-height:0;position:relative}
  #board{flex:1;display:flex;gap:14px;overflow-x:auto;padding:16px 18px;align-items:flex-start;min-height:0}
  .lane{flex:1 1 0;min-width:250px;max-width:none;display:flex;flex-direction:column;background:var(--bg2);
        border:1px solid var(--line2);border-radius:var(--radius);max-height:100%}
  .lane.drop{outline:2px dashed var(--brand);outline-offset:-3px;background:var(--brand-soft)}
  .lane > .lh{display:flex;align-items:center;gap:9px;padding:12px 14px 10px;position:sticky;top:0;flex:none}
  .lh .bar{width:10px;height:10px;border-radius:4px;flex:none}
  .lh .name{font-weight:700;font-size:13px}
  .lh .cnt{margin-left:auto;color:var(--muted);font-weight:700;background:var(--panel);border-radius:20px;padding:1px 9px;font-size:11px;border:1px solid var(--line)}
  .lh .plus{width:24px;height:24px;border-radius:7px;border:1px dashed var(--line);background:transparent;color:var(--muted);display:grid;place-items:center;font-size:15px}
  .lh .plus:hover{border-color:var(--brand);color:var(--brand)}
  .items{overflow-y:auto;padding:2px 10px 12px;flex:1;min-height:60px}
  .lane.done .items .card{opacity:.82}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:10px;
        box-shadow:var(--shadow);cursor:grab;transition:.12s;border-left:3px solid transparent}
  .card:hover{border-color:var(--faint);transform:translateY(-1px);box-shadow:0 4px 16px rgba(20,30,60,.09)}
  .card:active{cursor:grabbing}
  .card.pri-hi{border-left-color:var(--warn)}
  .card .ct{font-weight:640;line-height:1.4;font-size:13.5px;color:var(--ink)}
  .card .cspec{color:var(--muted);font-size:12px;line-height:1.45;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .cfoot{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px}
  .chip{font-size:11px;padding:2.5px 9px;border-radius:20px;background:var(--bg2);color:var(--muted);font-weight:650;display:inline-flex;align-items:center;gap:4px}
  .chip.pri{background:#fff4de;color:#b45309} :root[data-theme="dark"] .chip.pri{background:#3a2e12;color:#f6c25a}
  .chip.who{background:var(--brand-soft);color:var(--brand-ink)}
  .chip.miniav{padding:2px 9px 2px 3px}
  .chip .mav{width:17px;height:17px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:9px;font-weight:800}
  .card .cdep{color:var(--warn);font-size:11px;margin-top:8px;font-weight:600;display:flex;align-items:center;gap:5px}
  .card .runner{margin-top:9px;font-size:11px;color:var(--prog);font-weight:650;display:flex;align-items:center;gap:6px}
  .card .runner .rd{width:7px;height:7px;border-radius:50%;background:var(--prog);animation:blink 1.1s infinite}
  @keyframes blink{50%{opacity:.25}}
  .lane .empty{color:var(--faint);font-size:12px;text-align:center;padding:18px 8px;border:1.5px dashed var(--line);border-radius:11px;margin:4px 2px}

  /* ── ACTIVITY DRAWER ── */
  #drawer{width:340px;flex:none;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;transition:margin-right .2s;min-height:0}
  #drawer.hidden{margin-right:-341px}
  .dwh{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px;gap:8px}
  .dwh .cls{margin-left:auto}
  #feed{overflow-y:auto;padding:12px;flex:1}
  .fcard{border-radius:11px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:.12s;border:1px solid transparent;display:flex;gap:10px}
  .fcard:hover{background:var(--panel2);border-color:var(--line)}
  .fic{width:30px;height:30px;border-radius:9px;background:var(--bg2);display:grid;place-items:center;font-size:14px;flex:none}
  .fcard.msg .fic{background:var(--brand-soft)}
  .fc-who{font-weight:650;font-size:12.5px}
  .fc-tm{color:var(--faint);font-size:11px}
  .fc-act{color:var(--muted);font-size:12px;margin-top:1px}
  .fc-tgt{font-weight:600;font-size:12.5px;margin-top:2px;line-height:1.35}
  .fc-body{font-size:12.5px;margin-top:3px;line-height:1.45;color:var(--ink2)}
  .fabtoggle{position:absolute;right:16px;bottom:16px;width:46px;height:46px;border-radius:14px;border:none;
     background:var(--panel);box-shadow:var(--shadow-lg);color:var(--brand-ink);font-size:19px;display:none;place-items:center;z-index:15;border:1px solid var(--line)}
  #drawer.hidden ~ .fabtoggle{display:grid}

  /* ── MODAL ── */
  .overlay{position:fixed;inset:0;background:rgba(12,16,32,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;animation:fade .15s}
  @keyframes fade{from{opacity:0}}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-lg);width:min(540px,96vw);max-height:92vh;display:flex;flex-direction:column;animation:pop .17s}
  .modal.wide{width:min(680px,96vw)}
  @keyframes pop{from{transform:translateY(10px) scale(.98);opacity:.6}}
  .mh{display:flex;align-items:center;gap:10px;padding:18px 22px 14px;border-bottom:1px solid var(--line)}
  .mh h3{margin:0;font-size:16px;font-weight:720}
  .mh .x{margin-left:auto}
  .mb{padding:18px 22px;overflow-y:auto}
  .mf{display:flex;gap:10px;justify-content:flex-end;padding:14px 22px;border-top:1px solid var(--line);flex-wrap:wrap}
  label{display:block;font-size:12px;font-weight:650;color:var(--muted);margin:15px 0 6px}
  label:first-child{margin-top:0}
  .field{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14px;color:var(--ink);background:var(--panel2);transition:.12s;outline:none}
  .field:focus{border-color:var(--brand);background:var(--panel);box-shadow:0 0 0 3px var(--brand-soft)}
  textarea.field{resize:vertical;min-height:80px;line-height:1.55}
  textarea.big{min-height:150px;font-size:14.5px}
  .row{display:flex;gap:12px}.row>*{flex:1;min-width:0}
  .hint{color:var(--muted);font-size:12px;margin-top:7px;line-height:1.45}
  .helpbox{background:var(--brand-soft);border:1px solid transparent;border-radius:11px;padding:11px 13px;font-size:12.5px;line-height:1.5;color:var(--brand-ink);margin-top:6px}
  /* assignee picker */
  .whopick{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
  .whoopt{display:flex;align-items:center;gap:8px;padding:7px 13px 7px 8px;border:1.5px solid var(--line);border-radius:30px;background:var(--panel2);cursor:pointer;font-weight:600;font-size:13px;transition:.12s}
  .whoopt:hover{border-color:var(--brand)}
  .whoopt.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-ink)}
  .whoopt .av{width:24px;height:24px;font-size:11px}
  .prisel{display:flex;gap:7px}
  .prisel .po{flex:1;text-align:center;padding:9px;border:1.5px solid var(--line);border-radius:10px;background:var(--panel2);font-weight:650;font-size:13px;cursor:pointer}
  .prisel .po.on{border-color:var(--warn);background:#fff4de;color:#b45309}
  :root[data-theme="dark"] .prisel .po.on{background:#3a2e12;color:#f6c25a}

  /* detail modal bits */
  .dsec{margin-top:18px}
  .dsec:first-child{margin-top:0}
  .dsec h4{margin:0 0 9px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700}
  .badge{font-size:11px;padding:3px 11px;border-radius:20px;font-weight:700;color:#fff}
  .b-todo{background:var(--todo)} .b-claimed{background:var(--claimed)} .b-in_progress{background:var(--prog)}
  .b-blocked{background:var(--danger)} .b-review{background:var(--review)} .b-done{background:var(--done)}
  .dtask{border:1px solid var(--line);border-radius:12px;padding:13px;background:var(--panel2)}
  .dtask-h{display:flex;align-items:center;gap:9px;font-size:14px;margin-bottom:7px;line-height:1.35;font-weight:640}
  .dmeta{color:var(--muted);font-size:12px;line-height:1.5}
  .dspec{margin-top:9px;font-size:13px;line-height:1.6;white-space:pre-wrap;color:var(--ink2)}
  .art{background:var(--bg2);border-radius:9px;padding:10px;font-size:11.5px;overflow-x:auto;margin-top:9px;font-family:var(--mono)}
  .tl{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line2);font-size:12.5px;align-items:baseline}
  .tl:last-child{border:none}.tl-ic{flex:none}.tl-tx{flex:1;line-height:1.45}.tl-tm{color:var(--faint);font-size:11px;flex:none}
  .dmsg{background:var(--brand-soft);border-radius:10px;padding:9px 11px;margin-bottom:7px;font-size:12.5px;line-height:1.5}
  .dmsg .rt{color:var(--muted);font-size:11px;float:right}
  .hero{display:flex;align-items:center;gap:12px}
  .hero .av{width:44px;height:44px;font-size:17px}
  .hero .hnm{font-weight:750;font-size:17px}
  .empty{color:var(--faint);font-size:12.5px;text-align:center;padding:14px}

  /* pages */
  .page{flex:1;overflow-y:auto;padding:22px;display:none}
  .page.on{display:block}
  .page-inner{max-width:1100px;margin:0 auto}
  /* Sohbet (grup chat) */
  #view-sohbet{padding:0}
  #view-sohbet.on{display:flex;flex-direction:column;overflow:hidden}
  .chatwrap{display:flex;flex-direction:column;flex:1;min-height:0;max-width:920px;width:100%;margin:0 auto}
  .chatlog{flex:1;overflow-y:auto;padding:22px 18px;display:flex;flex-direction:column;gap:8px}
  .cmsg{max-width:74%;padding:8px 12px 6px;border-radius:15px;font-size:14px;line-height:1.45;box-shadow:var(--shadow);word-wrap:break-word;overflow-wrap:anywhere;white-space:pre-wrap}
  .cmsg .cwho{font-size:11px;font-weight:700;margin-bottom:2px;color:var(--brand-ink)}
  .cmsg .ctime{font-size:10px;color:var(--faint);margin-top:2px;text-align:right;font-variant-numeric:tabular-nums}
  .cmsg.them{align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-bottom-left-radius:5px}
  .cmsg.me{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:5px}
  .cmsg.me .cwho{color:rgba(255,255,255,.9)} .cmsg.me .ctime{color:rgba(255,255,255,.72)}
  .cmsg.bot{background:var(--brand-soft);border:1px solid transparent}
  .cmsg.bot .cwho{color:var(--brand-ink)}
  .chatempty{margin:auto;color:var(--faint);font-size:14px;text-align:center;line-height:1.7}
  .chatbar{flex:none;display:flex;gap:9px;padding:12px 16px;border-top:1px solid var(--line);background:var(--panel);position:relative}
  .chatbar .field{flex:1;margin:0}
  .mentionpop{position:absolute;left:16px;right:16px;bottom:calc(100% - 2px);max-height:236px;overflow-y:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);padding:5px;display:none;z-index:30}
  .mentionpop.on{display:block}
  .mentionhdr{font-size:11px;font-weight:700;color:var(--faint);padding:5px 9px 3px}
  .mitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13.5px}
  .mitem.on,.mitem:hover{background:var(--brand-soft)}
  .mitem .mava{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--bg2);font-size:12px;flex:none}
  .mitem .msub{color:var(--faint);font-size:12px;margin-left:auto}
  .tabdot{display:none;margin-left:6px;padding:0 6px;height:16px;line-height:16px;border-radius:9px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;vertical-align:middle}
  .tabdot.on{display:inline-block}
  /* Canlı Claude terminali */
  .apill{cursor:pointer}
  .term{width:min(940px,96vw);height:min(82vh,780px);display:flex;flex-direction:column;background:#0c0e14;border-radius:16px;overflow:hidden;box-shadow:var(--shadow-lg);border:1px solid #1e2230}
  .th{display:flex;align-items:center;gap:11px;padding:12px 15px;background:#12141d;border-bottom:1px solid #1e2230;flex:none}
  .th .av{width:34px;height:34px;border-radius:9px;font-size:13px;color:#fff}
  .tnm{font-weight:700;font-size:14px;color:#e8ebf5}
  .tbot{color:#8f88ff;font-weight:600;font-size:11.5px}
  .tsub{font-size:12px;color:#8b93a7;margin-top:1px}
  .th .x{color:#8b93a7} .th .x:hover{color:#e8ebf5;background:#232838}
  .tbody{flex:1;overflow-y:auto;padding:16px 18px;font-family:var(--mono);font-size:12.5px;line-height:1.6;color:#cdd3e0}
  .tbody .s-text{white-space:pre-wrap;word-break:break-word}
  .tbody .s-tool{color:#4fd6a0;margin:7px 0 2px;font-weight:600;white-space:pre-wrap;word-break:break-word}
  .tbody .s-result{color:#697089;margin:0 0 5px;white-space:pre-wrap;word-break:break-word}
  .tbody .s-sys{color:#f6c25a;margin:9px 0;text-align:center;font-weight:600;opacity:.9}
  .tbody .live-cursor{display:inline-block;width:7px;height:14px;background:#4fd6a0;vertical-align:text-bottom;animation:blink 1s steps(1) infinite;margin-left:1px}
  @keyframes blink{50%{opacity:0}}
  .tempty{color:#5b6376;text-align:center;margin:auto;padding:44px 22px;font-family:var(--font);font-size:13.5px;line-height:1.6}
  .bk-add{display:flex;gap:9px;margin-bottom:14px}
  .bk-tools{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .bk-tools .field,.bk-add .field{padding:9px 12px;font-size:13px}
  .bk-tools .search{flex:1;min-width:180px}
  #journal{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .jrow{display:flex;gap:12px;align-items:baseline;padding:11px 15px;border-bottom:1px solid var(--line2)}
  .jrow:last-child{border:none}
  .jts{flex:none;color:var(--faint);font-size:11px;font-variant-numeric:tabular-nums;width:98px}
  .jtx{flex:1;font-size:13px;line-height:1.55}.jwho{font-weight:680}
  .jtag{font-size:10px;padding:1.5px 8px;border-radius:20px;font-weight:700}
  .t-activity{background:var(--brand-soft);color:var(--brand-ink)} .t-message{background:#f6e8ff;color:#8a2ce0} .t-memory{background:#d7f7e6;color:#0e8a5f}
  :root[data-theme="dark"] .t-message{background:#2c1c3e;color:#c99bf5}:root[data-theme="dark"] .t-memory{background:#123227;color:#4fd6a0}
  .jbody{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:9px 11px;margin-top:6px;font-size:12.5px;line-height:1.55;white-space:pre-wrap}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:17px 19px;box-shadow:var(--shadow)}
  .stat .n{font-size:28px;font-weight:780;letter-spacing:-.6px}
  .stat .l{color:var(--muted);font-size:12.5px;margin-top:3px}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:15px}
  .chart{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:17px;box-shadow:var(--shadow)}
  .chart h3{margin:0 0 12px;font-size:13px}.chart.wide{grid-column:1/-1}
  @media(max-width:860px){.charts{grid-template-columns:1fr}#drawer{position:absolute;right:0;top:0;bottom:0;z-index:20;box-shadow:var(--shadow-lg)}}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:11px;font-weight:600;font-size:13px;z-index:100;box-shadow:var(--shadow-lg);animation:fade .2s}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand"><div class="logo">◆</div>Conductor</div>
    <span class="proj" id="projName">…</span>
    <nav class="tabs">
      <a href="#pano" data-view="pano" class="active">Pano</a>
      <a href="#sohbet" data-view="sohbet">💬 Sohbet<span class="tabdot" id="chatDot"></span></a>
      <a href="#bellek" data-view="bellek">Bellek</a>
      <a href="#analitik" data-view="analitik">Analitik</a>
    </nav>
    <div class="spacer"></div>
    <div class="live"><span class="pulse" id="pulse"></span><span id="liveTxt">bağlanıyor…</span></div>
    <button class="iconbtn" title="Çalışma yönergesi (Brief)" onclick="showBrief()">ℹ️</button>
    <button class="iconbtn" title="Açık / koyu tema" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="btn primary" onclick="openTask()">＋ Görev</button>
  </header>

  <div class="team" id="team"></div>

  <div class="work" id="view-pano">
    <div id="board"></div>
    <aside id="drawer">
      <div class="dwh">🔔 Canlı akış <button class="iconbtn cls" style="width:30px;height:30px" onclick="toggleDrawer()">✕</button></div>
      <div id="feed"></div>
    </aside>
    <button class="fabtoggle" onclick="toggleDrawer()" title="Canlı akış">🔔</button>
  </div>

  <section id="view-bellek" class="page"><div class="page-inner">
    <div class="bk-add">
      <input class="field" id="bk_note" placeholder="Bir not / karar / devir (handoff) yaz…" onkeydown="if(event.key==='Enter')addNote()">
      <select class="field" id="bk_kind" style="width:auto"><option value="note">Not</option><option value="decision">Karar</option><option value="handoff">Devir</option></select>
      <button class="btn primary" onclick="addNote()">Ekle</button>
    </div>
    <div class="bk-tools">
      <input class="field search" id="bk_search" placeholder="🔍 Ara…" oninput="renderBellek()">
      <select class="field" id="bk_agent" style="width:auto" onchange="renderBellek()"><option value="">Herkes</option></select>
      <select class="field" id="bk_type" style="width:auto" onchange="renderBellek()">
        <option value="">Tüm türler</option><option value="activity">Olaylar</option>
        <option value="message">Mesajlar</option><option value="memory">Notlar</option></select>
      <button class="btn" onclick="loadJournal()">↻ Yenile</button>
    </div>
    <div id="journal"></div>
  </div></section>

  <section id="view-analitik" class="page"><div class="page-inner">
    <div class="cards" id="an_cards"></div>
    <div class="charts" id="an_charts"></div>
  </div></section>

  <section id="view-sohbet" class="page"><div class="chatwrap">
    <div id="chatlog" class="chatlog"></div>
    <div class="chatbar">
      <div class="mentionpop" id="mentionpop"></div>
      <input class="field" id="chatin" placeholder="Ekibe yaz…  ( @ ile bir Claude çağır )" autocomplete="off" maxlength="2000"
             oninput="chatInput()" onkeydown="chatKeydown(event)" onblur="setTimeout(closeMention,150)">
      <button class="btn primary" onclick="sendChat()">Gönder</button>
    </div>
  </div></section>
</div>

<script>
const LANES=[
  ["todo","Yapılacak","var(--todo)"],["claimed","Aktif","var(--claimed)"],
  ["in_progress","Test","var(--prog)"],["review","İnceleme","var(--review)"],
  ["done","Bitti","var(--done)"],["blocked","Bloke","var(--blocked)"]];
const LANE_TR=Object.fromEntries(LANES.map(l=>[l[0],l[1]]));
const AV=["#6a63f0","#2f9bee","#12b886","#f59f0a","#ef4444","#e0489b","#0ea5a5","#8b5cf6"];
let TOKEN=localStorage.getItem("conductor_token")||"";
let STATE={agents:[],tasks:[],activity:[],messages:[]};
let dragId=null, busy=false, drawerOpen=localStorage.getItem("cnd_drawer")!=="0";
let ME="", chatSeenId=+(localStorage.getItem("cnd_chatseen")||0), chatBooted=false;

function tok(){return TOKEN}
async function api(method,path,body){
  const r=await fetch(path,{method,headers:{"Authorization":"Bearer "+tok(),
    ...(body?{"content-type":"application/json"}:{})},body:body?JSON.stringify(body):undefined});
  if(r.status===401){promptToken();throw new Error("401")}
  if(!r.ok)throw new Error(await r.text());
  return r.status===204?null:r.json();
}
function esc(s){return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function ago(iso){if(!iso)return"—";const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<60)return Math.max(0,Math.round(s))+" sn";if(s<3600)return Math.round(s/60)+" dk";
  if(s<86400)return Math.round(s/3600)+" sa";return Math.round(s/86400)+" g";}
function avColor(n){let h=0;for(const c of (n||""))h=(h*31+c.charCodeAt(0))>>>0;return AV[h%AV.length];}
function initials(n){return (n||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function avatar(n,cls){return `<span class="av ${cls||''}" style="background:${avColor(n)}">${esc(initials(n))}</span>`;}
function toast(m){const t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}
function agentStatus(a){
  const hb=a.last_heartbeat?Date.now()-new Date(a.last_heartbeat).getTime():Infinity;
  if(a.status==="offline"||hb>600000)return "offline";      // 10 dk sessiz → offline (interaktif kod aralıkları online kalsın)
  if(a.status==="working"&&hb>300000)return "idle";          // 5 dk hareketsiz → boşta
  return a.status||"offline";
}

/* ── TEAM STRIP ── */
function renderTeam(){
  const el=document.getElementById("team");
  const byId=Object.fromEntries(STATE.tasks.map(t=>[t.id,t]));
  const ags=STATE.agents;
  if(!ags.length){el.innerHTML=`<span class="lbl">Ekip</span><span class="empty-team">Henüz ajan katılmadı — bir dev Claude'unu bağlayınca burada görünecek.</span>`;return;}
  el.innerHTML=`<span class="lbl">Ekip</span>`+ags.map((a,i)=>{
    const st=agentStatus(a);const ct=a.current_task_id&&byId[a.current_task_id];
    const sub=ct?`<span class="atask">▸ ${esc(ct.title)}</span>`:`<span class="ast">${st==='working'?'çalışıyor':st==='idle'?'boşta':st==='blocked'?'bloke':'çevrimdışı'} · ♥${ago(a.last_heartbeat)}${a.branch?' · ⎇'+esc(a.branch):''}</span>`;
    return `<div class="apill" title="Claude'un canlı ekranını izle" onclick="openStream(${i})">
      <span class="av" style="background:${avColor(a.name)}">${esc(initials(a.name))}<span class="sdot s-${st}"></span></span>
      <div style="min-width:0"><div class="anm">${esc(a.name)}</div>${sub}</div></div>`;
  }).join("");
}

/* ── BOARD ── */
let _sig="";
function renderBoard(force){
  const byId=Object.fromEntries(STATE.tasks.map(t=>[t.id,t]));
  const working=new Set(STATE.agents.filter(a=>agentStatus(a)==='working'&&a.current_task_id).map(a=>a.current_task_id));
  const sig=JSON.stringify([STATE.tasks.map(t=>[t.id,t.status,t.assignee,t.assign_mode,t.priority,t.board_order,t.title,(t.depends_on||[]).length]),[...working]]);
  if(!force && sig===_sig) return; _sig=sig;
  const board=document.getElementById("board");
  const sx=board.scrollLeft, sy={};
  board.querySelectorAll(".items").forEach(el=>sy[el.dataset.status]=el.scrollTop);
  board.innerHTML=LANES.map(([key,label,color])=>{
    const items=STATE.tasks.filter(t=>t.status===key).sort((a,b)=>(b.priority-a.priority)||((a.board_order||0)-(b.board_order||0)));
    const body=items.map(t=>card(t,byId,working)).join("")|| `<div class="empty">${key==='todo'?'Görev yok — ＋ Görev ile ekle':'—'}</div>`;
    return `<div class="lane ${key}" data-status="${key}">
      <div class="lh"><span class="bar" style="background:${color}"></span><span class="name">${label}</span>
        <span class="cnt">${items.length}</span>${key==='todo'?`<button class="plus" title="Yeni görev" onclick="openTask()">＋</button>`:''}</div>
      <div class="items" data-status="${key}">${body}</div></div>`;
  }).join("");
  wireDnD();
  board.scrollLeft=sx;
  board.querySelectorAll(".items").forEach(el=>{if(sy[el.dataset.status]!=null)el.scrollTop=sy[el.dataset.status];});
}
function card(t,byId,working){
  const unmet=(t.depends_on||[]).filter(id=>byId[id]&&byId[id].status!=="done").length;
  const run=working.has(t.id);
  return `<div class="card ${t.priority>=100?'pri-hi':''}" draggable="true" data-id="${t.id}" onclick="openTaskCard('${t.id}')">
    <div class="ct">${esc(t.title)}</div>
    ${t.spec?`<div class="cspec">${esc(t.spec)}</div>`:""}
    <div class="cfoot">
      ${t.priority?`<span class="chip pri">⚑ ${t.priority}</span>`:""}
      ${t.assignee?`<span class="chip who miniav">${avatar(t.assignee,'mav')}${esc(t.assignee)}</span>`
                  :`<span class="chip">🎲 havuz</span>`}
    </div>
    ${unmet?`<div class="cdep">⛔ ${unmet} bağımlılık bekliyor</div>`:""}
    ${run?`<div class="runner"><span class="rd"></span>Claude çalışıyor…</div>`:""}
  </div>`;
}

/* ── DRAG & DROP (basit: sadece durum değiştir, listener-prompt tuzağı YOK) ── */
function wireDnD(){
  document.querySelectorAll(".card").forEach(c=>{
    c.addEventListener("dragstart",e=>{dragId=c.dataset.id;busy=true;e.dataTransfer.effectAllowed="move";setTimeout(()=>c.style.opacity=".4",0)});
    c.addEventListener("dragend",()=>{busy=false;c.style.opacity="";document.querySelectorAll(".lane").forEach(l=>l.classList.remove("drop"))});
  });
  document.querySelectorAll(".lane").forEach(l=>{
    l.addEventListener("dragover",e=>{e.preventDefault();l.classList.add("drop")});
    l.addEventListener("dragleave",()=>l.classList.remove("drop"));
    l.addEventListener("drop",async e=>{e.preventDefault();l.classList.remove("drop");
      const st=l.dataset.status,id=dragId;dragId=null;busy=false;if(!id)return;
      const t=STATE.tasks.find(x=>x.id===id);if(!t||t.status===st)return;
      if(st==="claimed"){ activateTask(id); return; }      // Aktif'e sürükle = "BAŞLAT" tetiği → atanan Claude alır
      const patch={status:st};
      if(st==="todo"){patch.prompt_state="idle";}           // Yapılacak'a geri (Claude buna dokunmaz)
      try{busy=true;await api("PATCH","/api/tasks/"+id,patch);busy=false;await refresh(true);}catch(_){busy=false;}
    });
  });
}

/* ── AKTİF'E AL (başlat tetiği) ── */
function activateTask(id){
  const t=STATE.tasks.find(x=>x.id===id); if(!t){refresh(true);return;}
  const ags=STATE.agents.map(a=>a.name);
  if(t.assignee){   // zaten atanmış → direkt aktive et (listener'ı tetikle: prompt_state=pending)
    api("PATCH","/api/tasks/"+id,{status:"claimed",prompt:(t.spec||t.title||"Şartnamedeki işi eksiksiz uygula ve test et."),prompt_state:"pending"}).then(()=>{refresh(true);toast(t.assignee+"'in Claude'u alıyor…")}).catch(_=>refresh(true));
    return;
  }
  if(!ags.length){alert("Önce bir dev Claude'unu bağlamalı (ekip boş).");refresh(true);return;}
  const o=mkOverlay();o.onclick=e=>{if(e.target===o){o.remove();refresh(true);}};
  o.innerHTML=`<div class="modal" style="width:min(440px,94vw)"><div class="mh"><h3>▶ Aktif'e al — kim yapacak?</h3><button class="iconbtn x" onclick="this.closest('.overlay').remove();refresh(true)">✕</button></div>
    <div class="mb"><div class="hint" style="font-weight:650;color:var(--ink);font-size:14px">${esc(t.title)}</div>
    <label>Atanan kişi <span style="color:var(--faint);font-weight:500">— bu kişinin Claude'u görevi alır</span></label>
    <select class="field" id="act_who"><option value="">— seç —</option>${ags.map(n=>`<option>${esc(n)}</option>`).join("")}</select>
    <div class="helpbox">Kaydedince görev <b>Aktif</b>'e geçer; atanan kişinin bilgisayarındaki Claude daemon'ı görevi <b>otomatik</b> alıp (~1 dk) şartnameyi okuyarak çalışmaya başlar. <b>Yapılacak</b>'takilere Claude dokunmaz — orası senin beklemedeki listen.</div></div>
    <div class="mf"><button class="btn" onclick="this.closest('.overlay').remove();refresh(true)">Vazgeç</button>
      <button class="btn primary" onclick="doActivate('${id}',this)">▶ Aktif'e al</button></div></div>`;
  document.body.appendChild(o);setTimeout(()=>document.getElementById("act_who").focus(),40);
}
async function doActivate(id,btn){
  const who=document.getElementById("act_who").value;
  if(!who){document.getElementById("act_who").focus();return;}
  const t=STATE.tasks.find(x=>x.id===id)||{};
  btn.disabled=true;
  try{await api("PATCH","/api/tasks/"+id,{status:"claimed",assignee:who,assign_mode:"manual",prompt:(t.spec||t.title||"Şartnamedeki işi eksiksiz uygula ve test et."),prompt_state:"pending"});btn.closest(".overlay").remove();await refresh(true);toast(who+"'in Claude'u alıyor…")}
  catch(e){alert("Hata: "+(e.message||e));btn.disabled=false}
}

/* ── GÖREV OLUŞTUR ── */
let pickWho="", pickPri=0, pickDeps=[];
function whoPicker(sel){
  const ags=STATE.agents.map(a=>a.name);
  return `<div class="whopick">
    <div class="whoopt ${sel?'':'on'}" data-who="" onclick="pickAssignee(this,'')">🎲 Otomatik havuz</div>
    ${ags.map(n=>`<div class="whoopt ${sel===n?'on':''}" data-who="${esc(n)}" onclick="pickAssignee(this,'${esc(n)}')">${avatar(n)}${esc(n)}</div>`).join("")}</div>`;
}
function pickAssignee(el,n){pickWho=n;el.parentElement.querySelectorAll(".whoopt").forEach(x=>x.classList.toggle("on",x.dataset.who===n));}
function priPicker(v){const opts=[[0,"Normal"],[50,"Yüksek"],[100,"Acil ⚑"]];
  return `<div class="prisel">${opts.map(([p,l])=>`<div class="po ${v==p?'on':''}" data-p="${p}" onclick="pickPri=${p};this.parentElement.querySelectorAll('.po').forEach(x=>x.classList.toggle('on',x.dataset.p=='${p}'))">${l}</div>`).join("")}</div>`;}
function openTask(){
  pickWho="";pickPri=0;pickDeps=[];
  const tasks=STATE.tasks.filter(t=>t.status!=="done");
  const o=mkOverlay();
  o.innerHTML=`<div class="modal wide"><div class="mh"><h3>＋ Yeni görev</h3><button class="iconbtn x" onclick="closeOv(this)">✕</button></div>
    <div class="mb">
      <label>Başlık</label><input class="field" id="f_title" placeholder="Kısa ve net: ne yapılacak?">
      <label>Görev tanımı <span style="color:var(--faint);font-weight:500">— Claude bunu okuyup yapacak</span></label>
      <textarea class="field big" id="f_spec" placeholder="Ne yapılacak? Hangi dosya/servis? Beklenen sonuç? Nasıl test edilir?&#10;Ne kadar açık yazarsan Claude o kadar isabetli çalışır."></textarea>
      <label>Kim yapacak?</label>${whoPicker("")}
      <div class="helpbox">💡 Görev <b>Yapılacak</b>'ta bekler (Claude dokunmaz). Başlatmak istediğinde kartı <b>Aktif</b>'e sürükle → atanan kişinin Claude'u görev tanımını okuyup çalışır.</div>
      <label style="margin-top:16px">Öncelik</label>${priPicker(0)}
      ${tasks.length?`<label>Önce bitmesi gereken görevler (bağımlılık)</label>
        <select class="field" id="f_dep" multiple size="3">${tasks.map(t=>`<option value="${t.id}">${esc(t.title)}</option>`).join("")}</select>`:''}
    </div>
    <div class="mf"><button class="btn" onclick="closeOv(this)">Vazgeç</button>
      <button class="btn primary" onclick="submitTask(this)">Görevi oluştur</button></div></div>`;
  document.body.appendChild(o);setTimeout(()=>document.getElementById("f_title").focus(),40);
}
async function submitTask(btn){
  const g=id=>document.getElementById(id);
  const dep=g("f_dep")?[...g("f_dep").selectedOptions].map(o=>o.value):[];
  const title=g("f_title").value.trim();
  if(!title){g("f_title").focus();return}
  const body={title,spec:g("f_spec").value.trim()||null,priority:pickPri,
    assign_mode:pickWho?"manual":"auto",assignee:pickWho||null,depends_on:dep};
  btn.disabled=true;
  try{await api("POST","/api/tasks",body);closeOv(btn);await refresh(true);toast("Görev oluşturuldu")}
  catch(e){btn.disabled=false;alert("Hata: "+e.message)}
}

/* ── GÖREV DETAY / DÜZENLE ── */
function openTaskCard(id){
  const t=STATE.tasks.find(x=>x.id===id);if(!t)return;
  const ags=STATE.agents.map(a=>a.name);
  const acts=STATE.activity.filter(a=>(a.detail||{}).task_id===id);
  const msgs=STATE.messages.filter(m=>m.task_id===id);
  const statusOpts=LANES.map(([k,l])=>`<option value="${k}" ${t.status===k?"selected":""}>${l}</option>`).join("");
  const whoOpts=`<option value="">🎲 Otomatik havuz</option>`+ags.map(n=>`<option ${t.assignee===n?"selected":""}>${esc(n)}</option>`).join("");
  const art=t.artifacts&&Object.keys(t.artifacts).length?`<div class="dsec"><h4>Çıktılar</h4><pre class="art">${esc(JSON.stringify(t.artifacts,null,2))}</pre></div>`:"";
  const dep=(t.depends_on||[]).length?`<div class="hint">⛔ ${t.depends_on.length} bağımlılık tanımlı</div>`:"";
  const integ=(t.status==='in_progress'||t.status==='review')?`<button class="btn ok" title="Claude smoke test → main'e merge → huna.test deploy → Bitti. PROD'a dokunmaz." onclick="sendToReview('${t.id}')">🚀 Entegre & Deploy</button>`:'';
  const o=mkOverlay();
  o.innerHTML=`<div class="modal"><div class="mh"><span class="badge b-${t.status}">${LANE_TR[t.status]||t.status}</span><h3 style="font-size:15px">Görev</h3><button class="iconbtn x" onclick="closeOv(this)">✕</button></div>
    <div class="mb">
      <label>Başlık</label><input class="field" id="et_title" value="${esc(t.title)}">
      <label>Görev tanımı <span style="color:var(--faint);font-weight:500">— Claude bunu okur</span></label>
      <textarea class="field" id="et_spec" style="min-height:110px">${esc(t.spec||"")}</textarea>
      <div class="row"><div><label>Durum</label><select class="field" id="et_status">${statusOpts}</select></div>
        <div><label>Atanan</label><select class="field" id="et_who">${whoOpts}</select></div></div>
      <label>Öncelik</label>${priPicker(t.priority||0)}
      ${dep}${art}
      ${histHTML(t)}
      <div class="dsec"><div class="dmeta">Oluşturan: ${esc(t.created_by||"?")} · açıldı ${ago(t.created_at)} · güncellendi ${ago(t.updated_at)}</div></div>
      ${acts.length?`<div class="dsec"><h4>Geçmiş</h4><div style="max-height:22vh;overflow:auto">${timelineHTML(acts)}</div></div>`:""}
      ${msgs.length?`<div class="dsec"><h4>İlgili mesajlar</h4>${msgsHTML(msgs)}</div>`:""}
    </div>
    <div class="mf"><button class="btn danger" onclick="deleteTaskCard('${t.id}')">🗑 Sil</button><div style="flex:1"></div>
      ${integ}<button class="btn" onclick="closeOv(this)">Kapat</button>
      <button class="btn primary" onclick="saveTaskEdit('${t.id}',this)">Kaydet</button></div></div>`;
  pickPri=t.priority||0;
  document.body.appendChild(o);
}
async function saveTaskEdit(id,btn){
  btn.disabled=true;const g=x=>document.getElementById(x);const who=g("et_who").value;
  const body={title:g("et_title").value.trim(),spec:g("et_spec").value.trim()||null,
    status:g("et_status").value,priority:pickPri,assignee:who||null,assign_mode:who?"manual":"auto"};
  try{await api("PATCH","/api/tasks/"+id,body);closeOv(btn);await refresh(true);toast("Kaydedildi")}
  catch(e){alert("Kaydedilemedi: "+(e.message||e));btn.disabled=false}
}
async function deleteTaskCard(id){

    "task.claimed":{icon:"🖐",label:"görevi aldı",target:title},
    "task.updated":{icon:"✎",label:"güncelledi"+(d.status?" · "+(LANE_TR[d.status]||d.status):""),target:title},
    "task.reclaimed":{icon:"♻️",label:"görev havuza iade edildi (ajan çevrimdışı)",target:title},
    "task.deleted":{icon:"🗑",label:"görevi sildi",target:title},

    "message.posted":null};

}

function hhmm(v){const d=new Date(v);if(isNaN(d))return"";return d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});}
async function loadMe(){try{const r=await api("GET","/api/inbox");ME=r.agent||"";}catch(_){}}

function renderChat(){
  const log=document.getElementById("chatlog");if(!log)return;
  const msgs=chatMsgs();
  const nearBottom=log.scrollHeight-log.scrollTop-log.clientHeight<90;
  if(!msgs.length){log.innerHTML=`<div class="chatempty">Henüz mesaj yok — ekip sohbeti 👋<br><span style="font-size:12px">Bir Claude'a sormak için <b>@</b> yaz ve listeden seç (örn. <b>@isim-claude</b>).</span></div>`;markChatSeen();return;}
  const rows=msgs.map(m=>{
    const bot=/🤖/.test(m.from_agent||""), mine=!bot&&m.from_agent===ME;
    const cls=mine?'me':(bot?'them bot':'them');
    const who=mine?'':`<div class="cwho">${bot?'🤖 ':''}${esc((m.from_agent||'?').replace(/\s*🤖\s*$/,''))}</div>`;
    return `<div class="cmsg ${cls}">${who}${esc(m.body)}<div class="ctime">${hhmm(m.created_at)}</div></div>`;
  });

function markChatSeen(){const ms=chatMsgs();if(ms.length){chatSeenId=Math.max(chatSeenId,ms[ms.length-1].id);localStorage.setItem("cnd_chatseen",chatSeenId);}updateChatDot();}

/* ── @mention seçici ─────────────────────────────────────────── */
let MENTION={open:false, idx:0, items:[], start:-1};
function mentionCandidates(){
  const names=(STATE.agents||[]).map(a=>a.name).filter(Boolean);
  return names.map(n=>{const fn=n.split(" ")[0];
    return {label:fn+"-Claude", insert:fn.toLowerCase()+"-claude", sub:n+"'in Claude'u", ic:"🤖"};});
}
function chatInput(){
  const inp=document.getElementById("chatin");
  const pos=inp.selectionStart, pre=inp.value.slice(0,pos);
  const m=pre.match(/(?:^|\s)@(\S*)$/);
  if(!m){closeMention();return;}
  const q=m[1].toLowerCase();
  const items=mentionCandidates().filter(c=>c.insert.toLowerCase().includes(q)||c.label.toLowerCase().includes(q));
  if(!items.length){closeMention();return;}
  MENTION={open:true, idx:0, items, start:pos-m[1].length-1};
  renderMention();
}
function renderMention(){
  const pop=document.getElementById("mentionpop");if(!pop)return;
  pop.innerHTML=`<div class="mentionhdr">KİME SORULACAK</div>`+MENTION.items.map((c,i)=>
    `<div class="mitem${i===MENTION.idx?' on':''}" onmousedown="event.preventDefault();pickMention(${i})">
       <span class="mava">${c.ic}</span><b>@${esc(c.insert)}</b><span class="msub">${esc(c.sub)}</span></div>`).join("");
  pop.classList.add("on");
}
function closeMention(){MENTION.open=false;const p=document.getElementById("mentionpop");if(p)p.classList.remove("on");}
function pickMention(i){
  const inp=document.getElementById("chatin"),c=MENTION.items[i];if(!c)return;
  const pos=inp.selectionStart, before=inp.value.slice(0,MENTION.start), after=inp.value.slice(pos);
  const ins="@"+c.insert+" ";
  inp.value=before+ins+after;const np=(before+ins).length;
  closeMention();inp.focus();inp.setSelectionRange(np,np);
}
function chatKeydown(e){
  if(MENTION.open){
    if(e.key==="ArrowDown"){e.preventDefault();MENTION.idx=(MENTION.idx+1)%MENTION.items.length;renderMention();return;}
    if(e.key==="ArrowUp"){e.preventDefault();MENTION.idx=(MENTION.idx-1+MENTION.items.length)%MENTION.items.length;renderMention();return;}
    if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();pickMention(MENTION.idx);return;}
    if(e.key==="Escape"){e.preventDefault();closeMention();return;}
  }
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}
}
/* ── Canlı Claude terminali (ekipte kişiye tıkla → o Claude'un görev-içi ekranı) ── */
let STREAM={agent:null,since:0,timer:null,lastText:null};
function openStream(i){
  const a=STATE.agents[i]; if(!a){return;}
  closeStream();
  STREAM={agent:a.name,since:0,timer:null,lastText:null};
  const o=mkOverlay(); o.id="streamOverlay"; o.onclick=e=>{if(e.target===o)closeStream();};
  o.innerHTML=`<div class="term">
    <div class="th"><span class="av" style="background:${avColor(a.name)}">${esc(initials(a.name))}</span>
      <div style="min-width:0"><div class="tnm">${esc(a.name)} <span class="tbot">· Claude canlı ekran</span></div>
      <div class="tsub" id="termSub">bağlanıyor…</div></div>
      <div style="flex:1"></div><button class="iconbtn x" title="Kapat" onclick="closeStream()">✕</button></div>
    <div class="tbody" id="termBody"></div></div>`;
  document.body.appendChild(o);
  pollStream(true);
  STREAM.timer=setInterval(()=>pollStream(false),1200);
}
function closeStream(){ if(STREAM.timer)clearInterval(STREAM.timer); STREAM.timer=null; const o=document.getElementById("streamOverlay"); if(o)o.remove(); STREAM.agent=null; }
async function pollStream(first){
  if(!STREAM.agent)return;
  let rows; try{ rows=await api("GET","/api/stream?agent="+encodeURIComponent(STREAM.agent)+"&since="+STREAM.since); }catch(e){ return; }
  const body=document.getElementById("termBody"); if(!body)return;
  if(first){ body.innerHTML=""; STREAM.lastText=null; }
  if(!rows.length){
    if(first) body.innerHTML=`<div class="tempty">Şu an akış yok.<br>Bu kişiye bir görev <b>Aktif</b>'e alınınca, Claude'un yaptığı her şey (düşünceleri, çalıştırdığı komutlar) burada <b>canlı</b> akar.</div>`;
    return;
  }
  const nearBottom=body.scrollHeight-body.scrollTop-body.clientHeight<140;
  const cur=body.querySelector(".live-cursor"); if(cur)cur.remove();
  for(const r of rows){
    STREAM.since=Math.max(STREAM.since,r.id);
    if(r.kind==="text"){
      if(!STREAM.lastText){ STREAM.lastText=document.createElement("div"); STREAM.lastText.className="s-text"; body.appendChild(STREAM.lastText); }
      STREAM.lastText.textContent+=r.content;
    }else{
      STREAM.lastText=null;
      const d=document.createElement("div");
      d.className = r.kind==="tool"?"s-tool":(r.kind==="result"?"s-result":"s-sys");
      d.textContent=r.content; body.appendChild(d);
    }
  }
  // durum satırı
  const sub=document.getElementById("termSub"); const last=rows[rows.length-1];
  if(sub){ sub.textContent = (last.content||"").indexOf("bitti")>=0 ? "görev tamamlandı" : "çalışıyor… (canlı)"; }
  // yanıp sönen imleç (canlı hissi)
  if((last.content||"").indexOf("bitti")<0){ const c=document.createElement("span"); c.className="live-cursor"; body.appendChild(c); }
  if(nearBottom||first)body.scrollTop=body.scrollHeight;
}

function renderBellek(){
  const agent=document.getElementById('bk_agent').value,type=document.getElementById('bk_type').value,q=(document.getElementById('bk_search').value||'').toLowerCase();
  const items=[];
  JOURNAL.activity.forEach(a=>{const m=actMeta(a);if(!m)return;items.push({ts:a.created_at,type:'activity',who:a.actor,icon:m.icon,text:m.label+(m.target?' · '+m.target:'')});});
  JOURNAL.messages.forEach(m=>items.push({ts:m.created_at,type:'message',who:m.from_agent,icon:'💬',sub:m.to_agent?('→ '+m.to_agent):'→ herkes',body:m.body}));
  JOURNAL.memory.forEach(m=>items.push({ts:m.created_at,type:'memory',who:m.author,kind:m.kind,body:m.body,icon:m.kind==='handoff'?'🔁':m.kind==='decision'?'⚖️':'📝'}));
  let list=items.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  if(agent)list=list.filter(x=>x.who===agent);if(type)list=list.filter(x=>x.type===type);
  if(q)list=list.filter(x=>((x.text||'')+(x.body||'')+(x.who||'')).toLowerCase().includes(q));
  document.getElementById('journal').innerHTML=list.slice(0,400).map(x=>{
    const tt={activity:'olay',message:'mesaj',memory:'bellek'}[x.type];
    const tag=`<span class="jtag t-${x.type}">${tt}</span>`;
    const kt=x.kind?` <span class="jtag" style="background:var(--bg2);color:var(--muted)">${x.kind==='handoff'?'devir':x.kind==='decision'?'karar':'not'}</span>`:'';
    const line=x.text?esc(x.text):(x.sub?`<span class="dmeta">${esc(x.sub)}</span>`:'');
    const body=x.body?`<div class="jbody">${esc(x.body)}</div>`:'';
    return `<div class="jrow"><span class="jts">${fmtTs(x.ts)}</span><span>${x.icon}</span><span class="jtx"><span class="jwho">${esc(x.who||'?')}</span> ${tag}${kt} ${line}${body}</span></div>`;
  }).join('')||`<div class="empty">Kayıt yok</div>`;
}

/* ── ANALİTİK ── */
async function loadAnalytics(){try{renderAnalytics(await api("GET","/api/analytics"));}catch(_){}}
function barChart(data,h,color){
  if(!data.length)return`<div class="empty">Veri yok</div>`;
  const max=Math.max(1,...data.map(d=>d.v));const bw=Math.max(20,Math.min(64,Math.floor(600/data.length)));
  const W=data.length*bw,pad=22,bh=h-pad;
  const bars=data.map((d,i)=>{const H=Math.round(bh*d.v/max),x=i*bw,y=bh-H;
    return `<rect x="${x+bw*0.18}" y="${y}" width="${bw*0.64}" height="${H}" rx="4" fill="${color}"/>`+
      (d.v?`<text x="${x+bw/2}" y="${y-3}" text-anchor="middle" font-size="9" fill="var(--muted)">${d.v}</text>`:'')+
      `<text x="${x+bw/2}" y="${h-6}" text-anchor="middle" font-size="9" fill="var(--muted)">${esc(String(d.label))}</text>`;}).join('');
  return `<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${h}" style="width:100%;max-width:${W}px;height:${h}px;display:block">${bars}</svg></div>`;
}
function renderAnalytics(a){
  const t=a.totals;
  document.getElementById('an_cards').innerHTML=[[t.events,'Toplam olay'],[t.contributors,'Katkıda bulunan'],[a.tasks_status.done||0,'Tamamlanan görev'],[t.messages,'Mesaj'],[t.memory,'Bellek notu']]
    .map(([n,l])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
  const hours=Array.from({length:24},(_,h)=>({label:String(h).padStart(2,'0'),v:(a.by_hour.find(x=>x.hr===h)||{}).n||0}));
  const agents=a.per_agent.map(x=>({label:x.agent,v:x.n})),days=a.by_day.map(x=>({label:x.d.slice(5),v:x.n}));
  const st=Object.entries(a.tasks_status).map(([k,v])=>({label:LANE_TR[k]||k,v}));
  document.getElementById('an_charts').innerHTML=
    `<div class="chart wide"><h3>Etkinlik — saate göre</h3>${barChart(hours,150,'#6a63f0')}</div>`+
    `<div class="chart"><h3>Ajana göre etkinlik</h3>${barChart(agents,140,'#2f9bee')}</div>`+
    `<div class="chart"><h3>Görev durumu</h3>${barChart(st,140,'#12b886')}</div>`+
    `<div class="chart wide"><h3>Son 14 gün</h3>${barChart(days,120,'#8b5cf6')}</div>`;
}

/* ── LOOP ── */
async function refresh(force){
  if(busy&&!force)return;
  try{const s=await api("GET","/api/state");STATE=s;
    document.getElementById("liveTxt").textContent="canlı";document.getElementById("pulse").classList.remove("off");
    document.getElementById("projName").textContent=s.project||"proje";
    if(!chatBooted){chatBooted=true;const ids=(STATE.messages||[]).map(m=>m.id);chatSeenId=Math.max(chatSeenId,0,...ids);localStorage.setItem("cnd_chatseen",chatSeenId);}
    if(currentView()==='pano'){renderTeam();renderBoard(force);renderFeed();}
    if(currentView()==='analitik')loadAnalytics();
    if(currentView()==='sohbet')renderChat();
    updateChatDot();
  }catch(e){if(e.message!=="401"){document.getElementById("liveTxt").textContent="bağlantı yok";document.getElementById("pulse").classList.add("off");}}
}
function boot(){applyTheme();applyDrawer();loadMe();showView(currentView());refresh(true);}
if(!location.hash)history.replaceState(null,'','#pano');
applyTheme();
if(!TOKEN)promptToken();else boot();
setInterval(()=>{if(TOKEN)refresh()},2500);
</script>
