name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: conductor
          POSTGRES_PASSWORD: test
          POSTGRES_DB: conductor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conductor"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      DATABASE_URL: postgresql://conductor:test@localhost:5432/conductor
      ALLOWED_ORIGINS: "*"
      ENVIRONMENT: development
      REAPER_MODE: "off"          # no cron/inproc during tests
      DEV_SEED: "false"
      LOG_JSON: "false"

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Apply migrations
        run: python migrate_all.py
      - name: Run tests
        run: pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Fail on known-vulnerable dependencies
        run: npm audit --audit-level=high
